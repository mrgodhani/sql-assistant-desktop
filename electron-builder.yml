appId: com.sql-assist.desktop
productName: SQL Assist
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
  - node_modules/better-sqlite3/**
mac:
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder for database files and exports.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder for saving exports.
    - NSQuitAlwaysKeepsWindows: false
  target:
    - target: default
      arch:
        - universal
  notarize: true
mas:
  hardenedRuntime: false
  entitlements: build/entitlements.mas.plist
  entitlementsInherit: build/entitlements.mas.inherit.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder for database files and exports.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder for saving exports.
  target:
    - target: mas
      arch:
        - universal
dmg:
  artifactName: ${name}-${version}.${ext}
npmRebuild: true
publish:
  provider: github
  owner: meetgodhani
  repo: sql-assist-desktop
